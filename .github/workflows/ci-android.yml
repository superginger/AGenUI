name: CI - Android

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'platforms/android/**'
      - 'scripts/android/**'
      - 'scripts/common/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'platforms/android/**'
      - 'scripts/android/**'
      - 'scripts/common/**'
      - '.github/workflows/ci-android.yml'

concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install CMake
        run: sdkmanager --install "cmake;3.18.1"

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('platforms/android/**/*.gradle*', 'platforms/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android AAR
        run: ./scripts/android/build.sh

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: android-aar-${{ github.sha }}
          path: dist/android/release/*.aar
          retention-days: 7
