plugins {
    alias(libs.plugins.android.library)
    id 'maven-publish'
}

// ==================== Maven Publishing Configuration ====================
// Coordinates: com.amap.genui:agenui-sdk:<version> (version in gradle.properties)
//
// Publish to local Maven (development):
//   ./gradlew publishReleasePublicationToLocalMavenRepository
//
// Publish to remote Maven (production):
//   Set env vars: MAVEN_URL / MAVEN_USERNAME / MAVEN_PASSWORD
//   ./gradlew publishReleasePublicationToRemoteMavenRepository

def localMavenDir = "${System.getProperty('user.home')}/.m2/repository"

// ==================== Yoga Configuration (dual-control) ====================
// Two independent controls:
//   1. yoga.prebuilt.dir  — path to prebuilt yoga (libyoga.so + headers)
//   2. yoga.include.in.aar — whether to bundle libyoga.so into the AAR (default: true)
//
// Priority: Gradle -P parameter > local.properties > default (FetchContent + include)
// ============================================================================

// --- Read local.properties for yoga config ---
def localProps = new Properties()
def localPropsFile = file("${rootProject.projectDir}/local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}

// --- Resolve YOGA_PREBUILT_DIR ---
def resolvedYogaPrebuiltDir = ''
if (project.hasProperty('YOGA_PREBUILT_DIR')) {
    resolvedYogaPrebuiltDir = project.property('YOGA_PREBUILT_DIR')
    logger.lifecycle("[yoga] Using prebuilt dir from -P parameter: ${resolvedYogaPrebuiltDir}")
} else if (localProps.containsKey('yoga.prebuilt.dir')) {
    resolvedYogaPrebuiltDir = localProps.getProperty('yoga.prebuilt.dir')
    logger.lifecycle("[yoga] Using prebuilt dir from local.properties: ${resolvedYogaPrebuiltDir}")
}
// Validate if set
if (resolvedYogaPrebuiltDir && !file("${resolvedYogaPrebuiltDir}/libs/libyoga.so").exists()) {
    throw new GradleException("[yoga] ERROR: yoga.prebuilt.dir is set but invalid — " +
        "libyoga.so not found at: ${resolvedYogaPrebuiltDir}/libs/libyoga.so")
}

// --- Resolve YOGA_INCLUDE_IN_AAR (default: true) ---
def resolvedYogaIncludeInAar = true
if (project.hasProperty('YOGA_INCLUDE_IN_AAR')) {
    resolvedYogaIncludeInAar = project.property('YOGA_INCLUDE_IN_AAR').toString().toBoolean()
    logger.lifecycle("[yoga] Include in AAR from -P parameter: ${resolvedYogaIncludeInAar}")
} else if (localProps.containsKey('yoga.include.in.aar')) {
    resolvedYogaIncludeInAar = localProps.getProperty('yoga.include.in.aar').toBoolean()
    logger.lifecycle("[yoga] Include in AAR from local.properties: ${resolvedYogaIncludeInAar}")
}

if (!resolvedYogaPrebuiltDir) {
    logger.lifecycle("[yoga] No prebuilt configured — will use GitHub FetchContent (built-in)")
} else {
    logger.lifecycle("[yoga] Prebuilt: ${resolvedYogaPrebuiltDir}, include in AAR: ${resolvedYogaIncludeInAar}")
}

android {
    namespace 'com.amap.a2ui_sdk'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 35

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"

        // C++ configuration
        // Inject the repo root into CMake via -DAGENUI_REPO_ROOT to avoid using .. traversal in CMakeLists.
        // rootProject.projectDir = platforms/android/, its parentFile = platforms/,
        // and the next parentFile = the agenui/ repo root.
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                abiFilters 'arm64-v8a'
                // When using prebuilt yoga (compiled with c++_shared), we must use c++_shared
                // to avoid mixing STL types in the same process (NDK requirement).
                def stlType = resolvedYogaPrebuiltDir ? "c++_shared" : "c++_static"
                def cmakeArgs = ["-DANDROID_STL=" + stlType,
                          "-DAGENUI_REPO_ROOT=" + rootProject.projectDir.parentFile.parentFile.absolutePath]
                // Pass YOGA_PREBUILT_DIR to CMake if resolved
                if (resolvedYogaPrebuiltDir) {
                    cmakeArgs.add("-DYOGA_PREBUILT_DIR=" + resolvedYogaPrebuiltDir)
                }
                // -PagenuiEmitDebugSymbols=true on the Gradle CLI flips on the
                // CMake post-build step that splits DWARF info into lib*.so.debug
                // companion files (see CMakeLists.txt agenui_split_debug_symbols).
                // No effect for debug builds even when the property is set.
                if (project.hasProperty('agenuiEmitDebugSymbols')
                        && project.property('agenuiEmitDebugSymbols').toString().toBoolean()) {
                    cmakeArgs.add("-DAGENUI_EMIT_DEBUG_SYMBOLS=ON")
                }
                arguments(*cmakeArgs)
            }
        }
    }

    buildTypes {
        debug {
            externalNativeBuild {
                cmake {
                    arguments "-DCMAKE_BUILD_TYPE=Debug"
                }
            }
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            externalNativeBuild {
                cmake {
                    arguments "-DCMAKE_BUILD_TYPE=Release"
                }
            }
        }
    }

    // CMake configuration
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.18.1"
        }
    }

    ndkVersion "27.3.13750724"

    // Exclude libyoga.so and libc++_shared.so from AAR when configured not to include yoga.
    // In this mode, the host app is responsible for providing both libraries.
    if (resolvedYogaPrebuiltDir && !resolvedYogaIncludeInAar) {
        packagingOptions {
            exclude '**/libyoga.so'
            exclude '**/libc++_shared.so'
        }
    }
    sourceSets {
        main {
            res.srcDirs = ['src/main/res', 'src/main/res-icons']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation libs.picasso
    implementation libs.gson
    implementation libs.cardview
    implementation libs.viewpager2
    implementation libs.recyclerview

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}

// ==================== afterEvaluate: Publishing ====================
afterEvaluate {
    publishing {
        publications {
            ['release', 'debug'].each { variant ->
                def capVariant = variant.capitalize()

                create(variant, MavenPublication) {
                    // Allow -PmavenVersion / -PmavenGroupId / -PmavenArtifactId to override defaults.
                    // -PmavenAarPath overrides the AAR file path (release only). Used by external
                    // wrappers that publish a previously-built sidecar AAR (e.g. the
                    // <name>-symbols.aar from --with-symbols) through this same publication with
                    // a suffixed version, without re-running assembleRelease.
                    def pubGroupId = project.hasProperty('mavenGroupId') ? project.property('mavenGroupId') : SDK_GROUP_ID
                    def pubArtifactId = project.hasProperty('mavenArtifactId') ? project.property('mavenArtifactId') : SDK_ARTIFACT_ID
                    def pubVersion = project.hasProperty('mavenVersion') ? project.property('mavenVersion') : SDK_VERSION
                    def defaultAarPath = "${buildDir}/outputs/aar/${project.name}-${variant}.aar"
                    def pubAarPath = (variant == 'release' && project.hasProperty('mavenAarPath'))
                            ? project.property('mavenAarPath') : defaultAarPath

                    groupId    = pubGroupId
                    artifactId = pubArtifactId
                    version    = pubVersion

                    if (project.hasProperty('mavenVersion')) {
                        logger.lifecycle("[maven] Publishing ${variant} with version: ${pubVersion} (groupId=${pubGroupId}, artifactId=${pubArtifactId}, aar=${pubAarPath})")
                    }

                    def normalAar = file(pubAarPath)
                    if (variant == 'release' && project.hasProperty('mavenAarPath')) {
                        artifact(normalAar)
                    } else {
                        artifact(normalAar) {
                            builtBy tasks.named("assemble${capVariant}")
                        }
                    }

                    pom {
                        name        = 'AGenUI'
                        description = 'A Native Renderer for A2UI - AGen UI SDK.'
                        url         = 'https://github.com/AGenUI/AGenUI-Client-Android'

                        licenses {
                            license {
                                name = 'Apache-2.0'
                                url  = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                            }
                        }

                        withXml {
                            def deps = asNode().appendNode('dependencies')
                            configurations["${variant}RuntimeClasspath"]
                                .resolvedConfiguration
                                .resolvedArtifacts
                                .findAll { it.moduleVersion.id.group != project.group }
                                .each { resolvedArtifact ->
                                    def dep = deps.appendNode('dependency')
                                    dep.appendNode('groupId',    resolvedArtifact.moduleVersion.id.group)
                                    dep.appendNode('artifactId', resolvedArtifact.moduleVersion.id.name)
                                    dep.appendNode('version',    resolvedArtifact.moduleVersion.id.version)
                                    dep.appendNode('scope',      'runtime')
                                }
                        }
                    }
                }
            }
        }

        repositories {
            maven {
                name = 'LocalMaven'
                url  = uri(localMavenDir)
            }

            if (System.getenv('MAVEN_URL')) {
                maven {
                    name = 'RemoteMaven'
                    url  = uri(System.getenv('MAVEN_URL'))
                    credentials {
                        username = System.getenv('MAVEN_USERNAME') ?: ''
                        password = System.getenv('MAVEN_PASSWORD') ?: ''
                    }
                }
            }
        }
    }
}

// ==================== afterEvaluate: Native debug symbols AAR ====================
// When -PagenuiEmitDebugSymbols=true is passed on the Gradle CLI, the CMake
// post-build step (CMakeLists.txt agenui_split_debug_symbols) produces a
// lib<name>.so.debug companion file next to each .so under
// build/intermediates/cxx/Release/<hash>/obj/<abi>/. This block bundles those
// .so.debug files into <rootProject.name>-symbols.aar and chains it after
// assembleRelease via finalizedBy.
//
// Note: ".so.debug" follows the GNU/LLVM convention (objcopy's default debug
// file extension). It is NOT related to Android's "debug" buildType — both
// release and the symbols AAR are produced from the same release compile.
afterEvaluate {
    if (!project.hasProperty('agenuiEmitDebugSymbols')
            || !project.property('agenuiEmitDebugSymbols').toString().toBoolean()) {
        return
    }

    def symbolsTask = tasks.register('assembleReleaseSymbols', Zip) {
        group = 'build'
        description = 'Bundle lib*.so.debug companion files into a separate <name>-symbols.aar'

        // Best-effort dependency on the native build task so the .so.debug
        // files exist before we zip. The task name has stayed stable across
        // AGP 4.x–8.x for externalNativeBuild { cmake {} } projects.
        def nativeTask = tasks.findByName('externalNativeBuildRelease')
        if (nativeTask != null) {
            dependsOn nativeTask
        }

        archiveBaseName = rootProject.name
        archiveAppendix = 'symbols'
        archiveExtension = 'aar'
        destinationDirectory = file("${buildDir}/outputs/aar")

        // AGP keeps a per-config hash subdirectory under intermediates/cxx/Release/.
        // Old hashes are NOT pruned, so iterating "**/*.so.debug" across the whole
        // tree would pick up stale duplicates and Zip would fail with
        // "Entry ... is a duplicate". Always pick the freshest hash directory —
        // i.e. the one just produced by the externalNativeBuildRelease task that
        // runs immediately before this Zip task.
        def cxxReleaseRoot = file("${buildDir}/intermediates/cxx/Release")
        def pickFreshestCxxDir = {
            if (!cxxReleaseRoot.exists()) return null
            def candidates = cxxReleaseRoot.listFiles()?.findAll { it.isDirectory() }
            if (!candidates) return null
            // Rank by the freshest file mtime in each subtree (rather than the
            // directory's own mtime, which is not always updated when files
            // inside it change on some filesystems).
            return candidates.max { dir ->
                def files = fileTree(dir).files
                files.isEmpty() ? 0L : files*.lastModified().max()
            }
        }

        // from(Closure) is evaluated lazily at task execution — the freshest
        // hash dir is decided after externalNativeBuildRelease writes its output.
        from({
            def freshest = pickFreshestCxxDir()
            freshest == null ? files() : fileTree(freshest) { include '**/*.so.debug' }
        }) {
            // CMake output relative to <freshest>/: obj/<abi>/lib*.so.debug
            // Remap inside the AAR to: jni/<abi>/lib*.so.debug
            eachFile { fcd ->
                def segs = fcd.relativePath.segments
                fcd.relativePath = new RelativePath(true, 'jni', segs[-2], segs[-1])
            }
            includeEmptyDirs = false
        }

        // Reuse the library's real AndroidManifest.xml so the .aar passes
        // basic structure checks even though it carries no code/resources.
        from("${projectDir}/src/main/AndroidManifest.xml")

        doFirst {
            // Fail loudly if there are no .so.debug files in the freshest cxx
            // dir — the agenui_split_debug_symbols CMake POST_BUILD step did
            // not run. Most likely: assembleRelease wasn't invoked, or the
            // -PagenuiEmitDebugSymbols flag was not piped through to CMake.
            def freshest = pickFreshestCxxDir()
            def found = freshest == null ? [] :
                fileTree(freshest) { include '**/*.so.debug' }.files
            if (found.isEmpty()) {
                throw new GradleException(
                    "[symbols] No lib*.so.debug files found in the freshest cxx dir " +
                    "(${freshest ?: cxxReleaseRoot}). Make sure assembleRelease ran with " +
                    "-PagenuiEmitDebugSymbols=true so CMake's agenui_split_debug_symbols " +
                    "POST_BUILD step produced them.")
            }
            logger.lifecycle("[symbols] packaging ${found.size()} debug file(s) from ${freshest.name} into ${archiveFile.get().asFile.name}")
        }

        doLast {
            logger.lifecycle("[symbols] wrote ${archiveFile.get().asFile}")
        }
    }

    tasks.named('assembleRelease').configure { finalizedBy symbolsTask }
}
